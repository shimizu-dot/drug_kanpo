services:
  - type: web
    name: kanpo
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      # ローカル設定を上書きしたい場合のみ Render ダッシュボードで設定する。
      - key: SPRING_DATABASE_URL
        sync: false
      - key: SPRING_DATABASE_USERNAME
        sync: false
      - key: SPRING_DATABASE_PASSWORD
        sync: false
      - key: SPRING_SQL_INIT_MODE
        sync: false
