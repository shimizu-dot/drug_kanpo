spring.application.name=kanpo
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:${SPRING_DATABASE_URL:${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:h2:file:./data/kanpo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${SPRING_DATABASE_USERNAME:${JDBC_DATABASE_USERNAME:${DATABASE_USERNAME:sa}}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${SPRING_DATABASE_PASSWORD:${JDBC_DATABASE_PASSWORD:${DATABASE_PASSWORD:}}}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:init.sql
